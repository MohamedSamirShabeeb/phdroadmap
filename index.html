<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhD Mission Control & Supervisor Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        emerald: '#0F5132',
                        gold: '#C5A059'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif']
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
    <main class="max-w-7xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- Column 1: Performance -->
        <section class="space-y-6">
            <header class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-emerald">
                <h1 class="font-serif text-2xl text-emerald">PhD Mission Control</h1>
                <p class="text-sm text-slate-500">Ain Shams University | Diagnostic Hub</p>
                <button onclick="window.print()" class="mt-4 w-full bg-emerald text-white py-2 rounded text-sm hover:bg-green-900 transition">Export Diagnostic PDF</button>
            </header>

            <div class="bg-white p-6 rounded-xl shadow-sm text-center">
                <h2 class="text-lg font-bold mb-4">EWS Monitor</h2>
                <div class="relative w-32 h-32 mx-auto">
                    <svg class="w-full h-full transform -rotate-90">
                        <circle cx="64" cy="64" r="56" stroke="currentColor" stroke-width="8" fill="transparent" class="text-slate-200" />
                        <circle id="ews-ring" cx="64" cy="64" r="56" stroke="currentColor" stroke-width="8" fill="transparent" stroke-dasharray="351" stroke-dashoffset="351" class="text-emerald transition-all duration-500" />
                    </svg>
                    <span id="ews-val" class="absolute inset-0 flex items-center justify-center font-bold text-xl">0%</span>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <div class="bg-white p-3 rounded shadow-sm text-center"><div class="text-xs">Words</div><div id="m-words" class="font-bold">0</div></div>
                <div class="bg-white p-3 rounded shadow-sm text-center"><div class="text-xs">Cites</div><div id="m-cites" class="font-bold">0</div></div>
                <div class="bg-white p-3 rounded shadow-sm text-center"><div class="text-xs">Code</div><div id="m-code" class="font-bold">0</div></div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm space-y-4">
                <h2 class="text-md font-bold">Diagnostic Logger</h2>
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <input type="number" id="l-words" placeholder="Words" class="border p-2 rounded w-full">
                    <input type="number" id="l-cites" placeholder="Cites" class="border p-2 rounded w-full">
                    <select id="l-code" class="border p-2 rounded w-full"><option value="0">0 Code</option><option value="1">1</option><option value="5">5</option></select>
                    <button onclick="resetData()" class="bg-gold text-white rounded">Reset</button>
                </div>
                <textarea id="report" readonly class="w-full h-24 border p-2 text-xs bg-slate-50" placeholder="Summary report..."></textarea>
                <button onclick="copyReport()" class="text-xs underline text-emerald">Copy Report</button>
            </div>
        </section>

        <!-- Column 2: Data Ingestion -->
        <section class="lg:col-span-1 space-y-4">
            <div class="bg-white p-4 rounded-xl shadow-sm">
                <h2 class="text-sm font-bold mb-2">Data Readiness</h2>
                <div class="w-full bg-slate-200 h-2 rounded-full overflow-hidden">
                    <div id="readiness-bar" class="bg-gold h-full w-0 transition-all"></div>
                </div>
            </div>
            <div id="var-grid" class="grid grid-cols-1 gap-3">
                <!-- Variables injected via JS -->
            </div>
        </section>

        <!-- Column 3: Task Management -->
        <section class="space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm">
                <div class="flex justify-between mb-4">
                    <h2 class="font-bold">92-Day Task Table</h2>
                    <button class="text-xs bg-emerald text-white px-2 py-1 rounded">Sync Notion</button>
                </div>
                <select id="filter" class="w-full border p-2 mb-4 text-xs">
                    <option value="all">All Days</option><option value="july">July</option>
                </select>
                <div id="task-table" class="text-xs overflow-x-auto">
                    <!-- Table injected -->
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm">
                <h2 class="text-sm font-bold mb-2">Mendeley Library</h2>
                <input type="file" id="bib-upload" class="text-xs block w-full text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:bg-emerald file:text-white">
            </div>
        </section>
    </main>

    <script>
        const STORAGE_KEY = 'phd_dashboard_vFinal';
        let state = { words: 0, cites: 0, code: 0, vars: Array(17).fill('Not Started') };

        function init() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if(saved) state = JSON.parse(saved);
                renderDashboard();
            } catch(e) { console.error("Init failed", e); }
        }

        function calculateEwsScore() {
            const score = Math.min(100, (state.words/60000 * 40) + (state.cites/111 * 30) + (state.code/5 * 30));
            const ring = document.getElementById('ews-ring');
            const val = document.getElementById('ews-val');
            ring.style.strokeDashoffset = 351 - (351 * score / 100);
            val.innerText = Math.round(score) + '%';
            
            document.getElementById('m-words').innerText = state.words;
            document.getElementById('m-cites').innerText = state.cites;
            document.getElementById('m-code').innerText = state.code;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function renderDashboard() {
            const grid = document.getElementById('var-grid');
            grid.innerHTML = '';
            for(let i=0; i<17; i++) {
                grid.innerHTML += `<div class="bg-white p-3 rounded shadow-sm border-l-2 border-gold flex justify-between items-center">
                    <span class="text-xs font-bold">Variable ${i+1}</span>
                    <select onchange="updateVar(${i}, this.value)" class="text-[10px] border p-1 rounded">
                        <option ${state.vars[i] === 'Not Started' ? 'selected' : ''}>Not Started</option>
                        <option ${state.vars[i] === 'Sourced' ? 'selected' : ''}>Sourced</option>
                    </select>
                </div>`;
            }
            calculateEwsScore();
        }

        function updateVar(idx, val) { state.vars[idx] = val; calculateEwsScore(); }
        function resetData() { localStorage.removeItem(STORAGE_KEY); location.reload(); }
        function copyReport() { navigator.clipboard.writeText(document.getElementById('report').value); }

        window.onload = init;
    </script>
</body>
</html>
